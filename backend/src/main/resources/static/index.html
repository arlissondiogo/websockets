<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat WebSocket</title>
</head>
<body>

<h2>Chat WebSocket</h2>

<div>
    <input id="roomId" placeholder="Sala (ex: geral)" />
    <input id="username" placeholder="Seu nome" />
    <button onclick="connect()">Conectar</button>
</div>

<br>

<div>
    <input id="messageInput" placeholder="Digite sua mensagem..." />
    <button onclick="sendMessage()">Enviar</button>
</div>

<hr>

<div id="chatBox"></div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    let stompClient = null;
    let currentRoom = null;
    let username = null;

    function connect() {
        currentRoom = document.getElementById("roomId").value;
        username = document.getElementById("username").value;

        if (!currentRoom || !username) {
            alert("Preencha sala e nome.");
            return;
        }

        const socket = new SockJS("http://localhost:8080/chat");
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function(frame) {
            console.log("Connected: " + frame);

            stompClient.subscribe("/topic/room/" + currentRoom, function(message) {
                const data = JSON.parse(message.body);
                showMessage(data);
            });

            stompClient.send("/app/join", {}, JSON.stringify({
                roomId: currentRoom,
                sender: username,
                content: ""
            }));

            alert("Conectado na sala " + currentRoom);
        }, function(error) {
            console.error("Erro na conexão:", error);
        });
    }

    function sendMessage() {
        const content = document.getElementById("messageInput").value;
        if (!content || !stompClient) return;

        const message = {
            roomId: currentRoom,
            sender: username,
            content: content
        };

        stompClient.send("/app/chat", {}, JSON.stringify(message));
        document.getElementById("messageInput").value = "";
    }

    function showMessage(message) {
        const chatBox = document.getElementById("chatBox");
        const msgElement = document.createElement("p");
        msgElement.textContent = message.sender + ": " + message.content;
        chatBox.appendChild(msgElement);
    }
</script>

</body>
</html>
